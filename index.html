<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gray-200 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-lg rounded-xl w-[500px] p-8">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-6">
      <img src="./assets/github-logo.png" 
           class=" mb-3" alt="github">
      <h1 class="text-3xl font-semibold">GitHub Issues Tracker</h1>
      <p class="text-gray-500">Sign in to manage your issues</p>
    </div>

    <!-- Form -->
    <form>

      <!-- Username -->
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Username</label>
        <input id="input-username" type="text" placeholder="Enter Username"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
        <p class="text-purple-600 text-xs mt-1">Default: admin</p>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Password</label>
        <input id="input-password" type="password" placeholder="Enter Password"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
        <p class="text-purple-600 text-xs mt-1">Default: admin123</p>
      </div>

      <!-- Button -->
      <button
      id="sign-btn"
      class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-2 rounded-lg font-medium hover:opacity-90">
      Sign In
      </button>

    </form>

    <!-- OR -->
    <div class="flex items-center my-5">
      <hr class="flex-grow border-gray-300">
      <span class="mx-3 text-gray-400 text-sm">OR</span>
      <hr class="flex-grow border-gray-300">
    </div>

    <!-- Demo Credentials -->
    <div class="bg-gray-100 p-4 rounded-lg text-center text-sm">
      <p class="text-gray-500 mb-2">Demo Credentials:</p>
      <p><strong>Username:</strong> admin</p>
      <p><strong>Password:</strong> admin123</p>
    </div>

  </div>

  <script src="./scripts/login.js"></script>
</body>
</html>
