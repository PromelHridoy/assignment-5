<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <header>
  <div class="navbar bg-base-100 shadow-sm px-20">

    <!-- Left -->
    <div class="navbar-start flex items-center gap-2">
      <img class="w-9" src="./assets/github-logo.png" alt="github logo">
      <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
    </div>

    <!-- Right -->
    <div class="navbar-end flex gap-2">
      <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
      <button class="btn btn-primary">Logout</button>
    </div>

  </div>
</header>

<main>
    <section class="w-10/12 mx-auto mt-10">

  <!-- Filter Buttons -->
  <div class="bg-base-100 p-4 rounded-xl shadow flex gap-3 mb-6">
    <button id="all-btn" class="btn btn-primary w-28">All</button>
    <button id="open-btn" class="btn btn-outline w-28">Open</button>
    <button id="closed-btn" class="btn btn-outline w-28">Closed</button>
  </div>

  <!-- Issues Header -->
  <div class="bg-base-100  rounded-xl shadow">

    <div class="flex justify-between items-center p-6 border-b border-gray-200">
      
      <!-- Left -->
      <div class="flex items-center gap-3">
        <div class="bg-purple-100 p-2 rounded-full">
            <img src="./assets/Aperture.png" class="w-5" alt="">
        </div>

        <div>
          <h2 class="text-xl font-semibold"><span id="total">0</span> Issues</h2>
          <p class="text-sm text-gray-500">Track and manage your project issues</p>
        </div>
      </div>

      <!-- Right Legend -->
      <div class="flex gap-4 text-sm">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-green-500 rounded-full"></div> Open
        </div>

        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-purple-500 rounded-full"></div> Closed
        </div>
      </div>

    </div>

    <!-- Issues Grid -->
    <div id="card-container" class="grid md:grid-cols-2 lg:grid-cols-4 gap-4 p-6">

      <!-- Card -->
      <!-- <div class="card bg-base-100 border-t-4 border-green-500 shadow"> -->

          <div class="flex justify-between">
            <img src="./assets/Open-Status.png" alt="">

          </div>

          <h3 class="font-semibold mt-2">
            Fix Navigation Menu On Mobile Devices
          </h3>

          <p class="text-sm text-gray-500">
            The navigation menu doesn't collapse properly on mobile devices...
          </p>

          <div class="flex gap-2 mt-2">
            <div class="badge badge-error badge-soft badge-outline">BUG</div>
            <div class="badge badge-warning badge-soft badge-outline">HELP WANTED</div>
          </div>

        </div>

        <div class="border-t p-3 text-xs text-gray-500 space-y-2">
          <p>#1 by john_doe</p>
          <p>1/15/2024</p>
        </div> -->

      <!-- </div> -->

    </div>

  </div>

</section>
</main>


    <script src="./scripts/home.js"></script>
</body>
</html>
